services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ims
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://ims:secret@db:5432/ims"
      APP_URL: "http://localhost:8000"
      MAIL_MAILER: log
    depends_on:
      - db

volumes:
  pgdata:
