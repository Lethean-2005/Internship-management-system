name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunPowerShellScript" \
            --parameters 'commands=["Invoke-WebRequest -Uri ''https://github.com/Lethean-2005/Internship-management-system/archive/refs/heads/main.zip'' -OutFile ''C:\\project-new.zip'' -UseBasicParsing","if (Test-Path ''C:\\project-temp'') { Remove-Item ''C:\\project-temp'' -Recurse -Force }","Expand-Archive -Path ''C:\\project-new.zip'' -DestinationPath ''C:\\project-temp'' -Force","Copy-Item -Path ''C:\\project-temp\\Internship-management-system-main\\backend\\*'' -Destination ''C:\\inetpub\\wwwroot\\ims\\backend'' -Recurse -Force","Copy-Item -Path ''C:\\project-temp\\Internship-management-system-main\\frontend\\*'' -Destination ''C:\\inetpub\\wwwroot\\ims\\frontend'' -Recurse -Force","Remove-Item ''C:\\project-temp'' -Recurse -Force","Remove-Item ''C:\\project-new.zip'' -Force","cd C:\\inetpub\\wwwroot\\ims\\backend; C:\\php\\php.exe artisan migrate --force","cd C:\\inetpub\\wwwroot\\ims\\backend; C:\\php\\php.exe artisan config:cache","cd C:\\inetpub\\wwwroot\\ims\\backend; C:\\php\\php.exe artisan route:cache","iisreset"]' \
            --region us-east-1
